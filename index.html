<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>假于物prompt</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f6fb;
        --bg-2: #e9eef7;
        --panel: #ffffff;
        --panel-glass: rgba(255, 255, 255, 0.82);
        --stroke: rgba(148, 163, 184, 0.28);
        --text: #0f172a;
        --muted: #5f6b7a;
        --accent: #2f6bff;
        --accent-2: #20a37f;
        --danger: #f2555a;
        --shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
        --radius-xl: 26px;
        --radius-lg: 20px;
        --radius-md: 14px;
        --radius-sm: 10px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "SF Pro Display", "SF Pro Text", -apple-system, BlinkMacSystemFont,
          "Helvetica Neue", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        background:
          radial-gradient(circle at 18% 20%, rgba(116, 209, 255, 0.35), transparent 45%),
          radial-gradient(circle at 82% 8%, rgba(201, 255, 226, 0.45), transparent 40%),
          linear-gradient(160deg, var(--bg) 0%, var(--bg-2) 100%);
        color: var(--text);
        min-height: 100vh;
      }

      body.dragging {
        user-select: none;
        -webkit-user-select: none;
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      .app-shell {
        width: min(1280px, calc(100% - 2.4rem));
        margin: 1.6rem auto 2.6rem;
        display: flex;
        flex-direction: column;
        gap: 1.2rem;
      }

      .topbar {
        background: var(--panel-glass);
        border: 1px solid var(--stroke);
        border-radius: var(--radius-xl);
        padding: 1.2rem 1.4rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1.2rem;
        box-shadow: var(--shadow);
        backdrop-filter: blur(16px);
      }

      .brand {
        display: flex;
        flex-direction: column;
        gap: 0.3rem;
      }

      .brand h1 {
        margin: 0;
        font-size: clamp(1.4rem, 2.3vw, 2.1rem);
      }

      .brand p {
        margin: 0;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .topbar-actions {
        display: flex;
        gap: 0.6rem;
        align-items: center;
        flex-wrap: wrap;
      }

      .search {
        min-width: 240px;
        border-radius: 999px;
        border: 1px solid var(--stroke);
        padding: 0.55rem 0.9rem;
        background: rgba(255, 255, 255, 0.8);
      }

      .btn {
        border: 0;
        border-radius: 999px;
        padding: 0.55rem 0.95rem;
        cursor: pointer;
        font-weight: 600;
        transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
      }

      .btn:hover {
        transform: translateY(-1px);
      }

      .btn:active {
        transform: translateY(1px) scale(0.98);
      }

      .btn.bubble-btn {
        position: relative;
      }

      .btn.bubble-btn .btn-label {
        display: inline-block;
        transform: scale(1);
        transition: transform 160ms ease;
      }

      .btn.bubble-btn:hover {
        transform: translateY(-1px) scale(1.03);
      }

      .btn.bubble-btn:hover .btn-label {
        transform: scale(0.97);
      }

      .btn-primary {
        background: var(--accent);
        color: white;
        box-shadow: 0 12px 22px rgba(47, 107, 255, 0.24);
      }

      .btn-primary:hover {
        transform: translateY(-1px);
      }

      .btn-ghost {
        background: rgba(255, 255, 255, 0.7);
        border: 1px solid var(--stroke);
        color: var(--text);
      }

      .btn-subtle {
        background: rgba(15, 23, 42, 0.06);
        color: var(--text);
      }

      .main-grid {
        display: grid;
        grid-template-columns: minmax(220px, 0.9fr) minmax(440px, 2fr) minmax(280px, 1fr);
        gap: 1rem;
        align-items: start;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--stroke);
        border-radius: var(--radius-xl);
        padding: 1rem;
        box-shadow: var(--shadow);
      }

      .viewer-panel {
        position: sticky;
        top: 1.2rem;
        align-self: start;
      }

      .sidebar {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        user-select: none;
        -webkit-user-select: none;
        position: sticky;
        top: 1.2rem;
        align-self: start;
        max-height: calc(100vh - 2.4rem);
      }

      .panel-title {
        font-size: 1rem;
        margin: 0 0 0.65rem;
      }

      .category-list {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
        background: rgba(255, 255, 255, 0.6);
        border-radius: 16px;
        padding: 0.4rem;
        border: 1px solid rgba(148, 163, 184, 0.25);
        backdrop-filter: blur(12px);
        max-height: calc(80vh - 320px);
        overflow-y: auto;
        overscroll-behavior: contain;
        scrollbar-gutter: stable;
        -webkit-overflow-scrolling: touch;
        touch-action: pan-y;
        flex: 1;
        min-height: 160px;
        width: 100%;
        align-items: center;
      }

      .category-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.5rem 0.65rem;
        border-radius: 12px;
        cursor: pointer;
        transition: background 160ms ease, border-color 160ms ease;
        position: relative;
        padding-left: 0.6rem;
        user-select: none;
        border: 1px solid var(--level-border, rgba(148, 163, 184, 0.28));
        background: rgba(255, 255, 255, 0.7);
        width: calc(100% - var(--item-shrink, 0%));
        font-size: var(--item-size, 0.95rem);
        color: var(--item-color, #1f2a44);
        margin: 0 auto;
      }

      .category-item:hover {
        background: rgba(47, 107, 255, 0.08);
      }

      .category-item.active {
        background: rgba(47, 107, 255, 0.16);
        color: #11338c;
      }

      .category-item.ancestor {
        background: rgba(15, 23, 42, 0.06);
        border-color: rgba(148, 163, 184, 0.45);
      }

      .category-item.drag-target {
        outline: 2px solid rgba(47, 107, 255, 0.45);
        background: rgba(47, 107, 255, 0.12);
      }

      .category-label {
        display: flex;
        gap: 0.4rem;
        align-items: center;
        font-weight: 600;
      }

      .context-menu {
        position: fixed;
        min-width: 170px;
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid var(--stroke);
        border-radius: 14px;
        box-shadow: 0 18px 30px rgba(15, 23, 42, 0.16);
        padding: 0.35rem;
        z-index: 50;
      }

      .context-menu[hidden] {
        display: none;
      }

      .context-item {
        width: 100%;
        border: 0;
        background: transparent;
        text-align: left;
        padding: 0.5rem 0.65rem;
        border-radius: 10px;
        cursor: pointer;
        color: #1f2a44;
        font-size: 0.88rem;
        transition: background 150ms ease, transform 150ms ease;
      }

      .context-item:hover {
        background: rgba(47, 107, 255, 0.12);
        transform: translateX(2px);
      }

      .context-item.danger {
        color: #a12f32;
      }

      .file-prompt {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.38rem 0.65rem;
        border-radius: 10px;
        cursor: pointer;
        position: relative;
        padding-left: 0.55rem;
        transition: background 160ms ease, border-color 160ms ease;
        user-select: none;
        border: 1px solid var(--level-border, rgba(148, 163, 184, 0.22));
        background: rgba(255, 255, 255, 0.55);
        width: calc(100% - var(--item-shrink, 0%));
        font-size: var(--item-size, 0.82rem);
        color: var(--item-color, #5b6574);
        margin: 0 auto;
      }

      .category-item[data-depth="0"],
      .file-prompt[data-depth="0"] {
        --level-border: rgba(15, 23, 42, 0.8);
        --item-shrink: 0%;
        --item-size: 0.98rem;
        --item-color: #1f2a44;
        --index-size: 0.9rem;
      }

      .category-item[data-depth="1"],
      .file-prompt[data-depth="1"] {
        --level-border: rgba(31, 41, 55, 0.55);
        --item-shrink: 10%;
        --item-size: 0.88rem;
        --item-color: #3f4b5c;
        --index-size: 0.76rem;
      }

      .category-item[data-depth="2"],
      .file-prompt[data-depth="2"] {
        --level-border: rgba(107, 114, 128, 0.45);
        --item-shrink: 18%;
        --item-size: 0.8rem;
        --item-color: #5f6a79;
        --index-size: 0.68rem;
      }

      .category-item[data-depth="3"],
      .file-prompt[data-depth="3"] {
        --level-border: rgba(203, 213, 225, 0.75);
        --item-shrink: 26%;
        --item-size: 0.74rem;
        --item-color: #7a8594;
        --index-size: 0.6rem;
      }

      .file-prompt:hover {
        background: rgba(47, 107, 255, 0.08);
      }

      .file-prompt.active {
        background: rgba(47, 107, 255, 0.16);
        color: #11338c;
      }

      .drag-orb {
        position: fixed;
        width: 40px;
        height: 40px;
        border-radius: 999px;
        background: radial-gradient(
          circle at 30% 30%,
          rgba(255, 255, 255, 0.5),
          rgba(255, 255, 255, 0.16) 48%,
          rgba(148, 163, 184, 0.16) 75%
        );
        box-shadow: none;
        backdrop-filter: blur(3px) saturate(1.2) brightness(1.08);
        pointer-events: none;
        transform: translate(-50%, -50%) rotate(var(--rot, 0deg))
          scale(var(--sx, 0.9), var(--sy, 0.9));
        transition: transform 220ms cubic-bezier(0.22, 0.61, 0.36, 1);
        z-index: 60;
        animation: orb-float 5.2s ease-in-out infinite;
      }

      .drag-orb.active {
        transform: translate(-50%, -50%) rotate(var(--rot, 0deg))
          scale(var(--sx, 1), var(--sy, 1));
      }

      .drag-orb.settle {
        transition: transform 220ms ease;
        transform: translate(-50%, -50%) scale(1, 1);
      }

      .drag-orb::after {
        content: "";
        position: absolute;
        inset: 6px;
        border-radius: 999px;
        background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.55), transparent 60%);
        opacity: 0.42;
        animation: orb-shimmer var(--shimmer, 3.8s) ease-in-out infinite;
        transform: rotate(calc(var(--rot, 0deg) * -1));
      }

      .drag-orb::before {
        content: "";
        position: absolute;
        inset: -12px;
        border-radius: 999px;
        background: radial-gradient(circle at 40% 60%, rgba(255, 255, 255, 0.12), transparent 65%);
        filter: blur(6px);
        opacity: 0.35;
        transform: rotate(calc(var(--rot, 0deg) * -1));
      }

      .drag-orb.release {
        animation: orb-pop 260ms ease forwards;
      }

      .drag-orb.release::after,
      .drag-orb.release::before {
        animation: none;
      }

      

      @keyframes orb-pop {
        0% {
          transform: translate(-50%, -50%) scale(1);
          opacity: 1;
        }
        60% {
          transform: translate(-50%, -50%) scale(1.45);
          opacity: 0.8;
        }
        100% {
          transform: translate(-50%, -50%) scale(2);
          opacity: 0;
        }
      }

      .drop-flash {
        animation: drop-flash 260ms ease;
      }

      @keyframes drop-flash {
        0% {
          transform: scale(1);
          box-shadow: 0 0 0 rgba(47, 107, 255, 0);
        }
        60% {
          transform: scale(1.02);
          box-shadow: 0 10px 22px rgba(47, 107, 255, 0.18);
        }
        100% {
          transform: scale(1);
          box-shadow: 0 0 0 rgba(47, 107, 255, 0);
        }
      }

      @keyframes orb-float {
        0% {
          transform: translate(-50%, -50%) rotate(var(--rot, 0deg))
            scale(calc(var(--sx, 0.92) * (1 + var(--float, 0.06))),
              calc(var(--sy, 0.92) * (1 - var(--float, 0.06))));
        }
        50% {
          transform: translate(-50%, -50%) rotate(var(--rot, 0deg))
            scale(calc(var(--sx, 1) * (1 + var(--float, 0.1))),
              calc(var(--sy, 1) * (1 - var(--float, 0.08))));
        }
        100% {
          transform: translate(-50%, -50%) rotate(var(--rot, 0deg))
            scale(calc(var(--sx, 0.92) * (1 + var(--float, 0.06))),
              calc(var(--sy, 0.92) * (1 - var(--float, 0.06))));
        }
      }

      @keyframes orb-shimmer {
        0% {
          transform: translate(-6%, -4%) rotate(0deg);
          opacity: 0.65;
        }
        50% {
          transform: translate(8%, 6%) rotate(10deg);
          opacity: 0.85;
        }
        100% {
          transform: translate(-6%, -4%) rotate(0deg);
          opacity: 0.65;
        }
      }

      @keyframes bubble-flow {
        0% {
          transform: translate(-12%, -10%) rotate(0deg) scale(1);
        }
        50% {
          transform: translate(10%, 14%) rotate(16deg) scale(1.08);
        }
        100% {
          transform: translate(-12%, -10%) rotate(0deg) scale(1);
        }
      }
      .cat-toggle {
        border: 0;
        background: transparent;
        color: #546074;
        width: 22px;
        height: 22px;
        border-radius: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 0.95rem;
        transition: transform 150ms ease;
      }

      .cat-toggle:hover {
        color: #1f2a44;
      }

      .cat-toggle.expanded {
        transform: rotate(90deg);
      }



      .badge {
        background: rgba(15, 23, 42, 0.08);
        padding: 0.1rem 0.45rem;
        border-radius: 999px;
        font-size: 0.72rem;
        color: var(--muted);
      }

      .category-form {
        display: grid;
        gap: 0.5rem;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
      }

      .field label {
        font-size: 0.82rem;
        color: var(--muted);
      }

      .field input,
      .field select,
      .field textarea {
        border: 1px solid var(--stroke);
        border-radius: 12px;
        padding: 0.5rem 0.65rem;
      }

      .content-edit {
        border: 1px solid var(--stroke);
        border-radius: 12px;
        padding: 0.6rem 0.7rem;
        min-height: 160px;
        background: #fff;
        white-space: pre-wrap;
        line-height: 1.6;
        outline: none;
        max-height: 320px;
        overflow-y: auto;
      }

      .prompt-list {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        animation: slide-in 320ms ease;
        padding-bottom: 100vh;
      }

      .list-panel {
        position: relative;
        max-height: calc(100vh - 2.4rem);
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      #promptList {
        overflow-y: auto;
        padding-right: 0.6rem;
        flex: 1;
        scrollbar-gutter: stable;
        overscroll-behavior: contain;
        -webkit-overflow-scrolling: touch;
      }

      .list-panel::after {
        content: "";
        position: absolute;
        top: 1.2rem;
        right: 0.5rem;
        width: 8px;
        height: calc(100% - 2.4rem);
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.06);
        pointer-events: none;
      }

      .prompt-card {
        border: 1px solid var(--stroke);
        border-radius: var(--radius-lg);
        padding: 0.9rem;
        display: grid;
        grid-template-columns: 1fr;
        gap: 0.75rem;
        align-items: center;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 16px 32px rgba(15, 23, 42, 0.06);
        transition: box-shadow 200ms ease, border-color 200ms ease;
      }

      .prompt-card.has-thumb {
        grid-template-columns: 144px 1fr;
      }

      .prompt-card.active {
        border-color: rgba(47, 107, 255, 0.45);
        box-shadow: 0 18px 36px rgba(47, 107, 255, 0.16);
      }

      .prompt-card:hover {
        box-shadow: 0 18px 36px rgba(15, 23, 42, 0.12);
      }

      .prompt-card.select-anim {
        animation: select-pop 240ms ease;
      }

      .prompt-content {
        display: grid;
        gap: 0.4rem;
      }

      .prompt-card h3 {
        margin: 0;
        font-size: 1.02rem;
      }

      .prompt-thumb {
        width: 144px;
        height: 192px;
        border-radius: 16px;
        border: 1px solid var(--stroke);
        background: rgba(15, 23, 42, 0.04);
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--muted);
        font-size: 0.7rem;
        flex-shrink: 0;
        align-self: center;
      }

      .prompt-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .prompt-meta {
        color: var(--muted);
        font-size: 0.82rem;
      }

      .prompt-actions {
        display: flex;
        gap: 0.7rem;
        flex-wrap: wrap;
        margin-top: 0.45rem;
      }

      .prompt-footer {
        display: flex;
        justify-content: flex-end;
        margin-top: 0.35rem;
      }

      .prompt-date {
        font-size: 0.72rem;
        color: var(--muted);
      }

      .tag-row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem;
      }

      .tag {
        background: rgba(32, 163, 127, 0.14);
        color: #1a6b55;
        padding: 0.15rem 0.5rem;
        border-radius: 999px;
        font-size: 0.72rem;
      }

      .prompt-preview {
        background: rgba(15, 23, 42, 0.04);
        border-radius: 12px;
        padding: 0.55rem 0.7rem;
        font-size: 0.86rem;
        color: #293445;
        line-height: 1.5;
        margin-top: 0.25rem;
        max-height: 130px;
        overflow: auto;
      }

      .viewer {
        display: flex;
        flex-direction: column;
        gap: 0.9rem;
      }

      .viewer-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.6rem;
      }

      .viewer-header .prompt-actions {
        margin-left: auto;
        justify-content: flex-end;
      }

      .viewer-header .prompt-actions .btn {
        min-width: 88px;
        text-align: center;
      }

      .viewer-title {
        margin: 0;
        font-size: 1.2rem;
      }

      .viewer-content {
        background: rgba(15, 23, 42, 0.04);
        border-radius: var(--radius-md);
        padding: 0.9rem;
        line-height: 1.6;
        white-space: pre-wrap;
        max-height: 40vh;
        overflow: auto;
      }

      .image-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 0.6rem;
      }

      .image-card {
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid var(--stroke);
        background: rgba(255, 255, 255, 0.8);
      }

      .image-card img {
        width: 100%;
        height: 140px;
        object-fit: contain;
        display: block;
        background: rgba(15, 23, 42, 0.04);
      }

      .empty {
        border: 1px dashed rgba(148, 163, 184, 0.6);
        border-radius: var(--radius-lg);
        padding: 1.2rem;
        text-align: center;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.7);
      }

      .toast {
        position: fixed;
        right: 1.2rem;
        bottom: 1.2rem;
        padding: 0.6rem 0.9rem;
        border-radius: 12px;
        background: rgba(32, 163, 127, 0.96);
        color: white;
        box-shadow: 0 18px 30px rgba(32, 163, 127, 0.28);
        opacity: 0;
        transform: translateY(16px);
        transition: opacity 200ms ease, transform 200ms ease;
        pointer-events: none;
        z-index: 20;
      }

      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }

      .copy-btn.copied {
        background: rgba(32, 163, 127, 0.2);
        color: #126b54;
        animation: pop 260ms ease;
      }

      .modal {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.25);
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 1.4rem;
        z-index: 30;
        backdrop-filter: blur(8px);
      }

      .modal[hidden] {
        display: none;
      }

      .sheet {
        width: min(860px, 100%);
        background: var(--panel);
        border-radius: 32px 32px 22px 22px;
        padding: 1.2rem 1.4rem 1.5rem;
        border: 1px solid var(--stroke);
        box-shadow: var(--shadow);
        animation: slide-up 300ms ease;
      }

      .image-modal .sheet {
        width: min(900px, 92vw);
        padding: 0.6rem;
        border-radius: 22px;
      }

      .image-modal img {
        width: 100%;
        max-height: 78vh;
        object-fit: contain;
        display: block;
        border-radius: 16px;
        background: rgba(15, 23, 42, 0.04);
      }

      .text-modal .sheet {
        width: min(900px, 92vw);
        padding: 1rem 1.2rem;
        border-radius: 22px;
      }

      .text-modal .text-body {
        max-height: 70vh;
        overflow: auto;
        background: rgba(15, 23, 42, 0.04);
        border-radius: 16px;
        padding: 1rem;
        line-height: 1.7;
        white-space: pre-wrap;
        color: #1f2a44;
      }

      .file-sheet {
        width: min(520px, 92vw);
      }

      .mark-color {
        cursor: text;
        transition: color 160ms ease;
      }

      .mark-bubble {
        display: inline-flex;
        align-items: center;
        padding: 0.08rem 0.4rem;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.7);
        color: #1f2a44;
        backdrop-filter: blur(10px);
        box-shadow: 0 1px 3px rgba(15, 23, 42, 0.22);
        margin: 0 0.08rem;
        transition: transform 180ms ease, background 240ms ease;
      }

      .mark-bubble:hover {
        transform: scale(1.06);
        background: rgba(255, 255, 255, 0.7);
      }

      .mark-bubble:active {
        transform: scale(0.98);
      }

      .mark-bubble.clicked {
        animation: mark-pop 220ms ease;
      }

      @keyframes mark-pop {
        0% {
          transform: scale(1);
        }
        60% {
          transform: scale(1.08);
        }
        100% {
          transform: scale(1);
        }
      }

      .category-item:hover,
      .file-prompt:hover {
        transform: none;
      }

      .mark-row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem;
        margin-top: 0.35rem;
      }

      .mark-box {
        border: 1px solid var(--stroke);
        border-radius: 12px;
        padding: 0.5rem;
        background: rgba(255, 255, 255, 0.75);
        max-height: 140px;
        overflow-y: auto;
      }

      .mark-chip {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        padding: 0.2rem 0.55rem;
        border-radius: 999px;
        background: rgba(32, 163, 127, 0.14);
        color: #1a6b55;
        font-size: 0.75rem;
      }

      .mark-remove {
        border: 0;
        background: rgba(242, 85, 90, 0.2);
        color: #a12f32;
        width: 18px;
        height: 18px;
        border-radius: 999px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 0.7rem;
      }

      .composer {
        position: fixed;
        right: 1.2rem;
        bottom: 1.2rem;
        width: min(320px, 92vw);
        background: rgba(255, 255, 255, 0.55);
        border: 1px solid var(--stroke);
        border-radius: 20px;
        padding: 0.85rem;
        box-shadow: var(--shadow);
        backdrop-filter: blur(16px);
        z-index: 60;
        display: grid;
        gap: 0.6rem;
      }

      .composer .viewer-header {
        cursor: grab;
      }

      .composer.dragging .viewer-header {
        cursor: grabbing;
      }

      .composer textarea {
        width: 100%;
        min-height: 110px;
        resize: vertical;
        overflow: auto;
        overscroll-behavior: contain;
      }

      .composer-copy.copied {
        animation: pop 260ms ease;
        box-shadow: 0 10px 20px rgba(47, 107, 255, 0.25);
      }

      .sheet-grid {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 0.8rem;
        margin-top: 0.8rem;
      }

      .col-6 {
        grid-column: span 6;
      }

      .col-4 {
        grid-column: span 4;
      }

      .col-12 {
        grid-column: span 12;
      }

      .editor-actions {
        display: flex;
        justify-content: flex-end;
        gap: 0.6rem;
        margin-top: 0.8rem;
      }

      .image-preview {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(92px, 1fr));
        gap: 0.5rem;
      }

      .image-preview-item {
        position: relative;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid var(--stroke);
      }

      .image-preview-item img {
        width: 100%;
        height: 100px;
        object-fit: contain;
        display: block;
        background: rgba(15, 23, 42, 0.04);
      }

      .image-remove {
        position: absolute;
        top: 6px;
        right: 6px;
        border: 0;
        border-radius: 999px;
        background: rgba(242, 85, 90, 0.92);
        color: white;
        width: 24px;
        height: 24px;
        cursor: pointer;
        font-size: 0.8rem;
      }

      @keyframes slide-up {
        from {
          transform: translateY(24px);
          opacity: 0.9;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      @keyframes slide-in {
        from {
          opacity: 0;
          transform: translateX(18px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @keyframes float-in {
        from {
          transform: translateY(16px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      @keyframes select-pop {
        0% {
          transform: scale(1);
        }
        45% {
          transform: scale(1.015);
        }
        100% {
          transform: scale(1);
        }
      }

      @keyframes pop {
        0% {
          transform: scale(1);
        }
        45% {
          transform: scale(1.08);
        }
        100% {
          transform: scale(1);
        }
      }

      @media (max-width: 1100px) {
        .main-grid {
          grid-template-columns: 1fr 1fr;
          grid-template-areas:
            "sidebar list"
            "viewer viewer";
        }

          grid-area: sidebar;
        }

        }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }

    <script>
      const state = {
        db: { categories: [], prompts: [] },
        activeCategoryId: "all",
        activePromptId: null,
        editorPromptId: null,
        editorImages: [],
        editorMarks: [],
        contextFileId: null,
        fileAction: { type: null, fileId: null },
        drag: {

      const searchInput = document.getElementById("searchInput");
      const exportBtn = document.getElementById("exportBtn");

      const editorModal = document.getElementById("editorModal");

      const cancelEditorBtn = document.getElementById("cancelEditorBtn");

      const promptContent = document.getElementById("promptContent");

      const imageModal = document.getElementById("imageModal");
